version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: flowdesk-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-setup:
    image: mongo:6.0
    container_name: flowdesk-mongo-setup
    depends_on:
      - mongo
    restart: "no"
    entrypoint: [ "/bin/sh", "-c", "sleep 5 && mongosh --host mongo:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]})' || true" ]

  backend:
    build: ./backend
    container_name: flowdesk-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/flowdesk?replicaSet=rs0
      - JWT_ACCESS_SECRET=prod_access_secret_998
      - JWT_REFRESH_SECRET=prod_refresh_secret_998
      - CLIENT_URL=http://localhost
    depends_on:
      - mongo-setup

  frontend:
    build: ./frontend
    container_name: flowdesk-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
